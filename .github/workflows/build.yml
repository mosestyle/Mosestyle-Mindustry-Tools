name: Build Mindustry Auto Route

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Add Android d8 to PATH
        run: echo "${ANDROID_HOME}/build-tools/34.0.0" >> "$GITHUB_PATH"

      - name: Build Android + desktop JAR
        run: gradle deploy --no-daemon

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: MindustryAutoRoute
          path: build/libs/MindustryAutoRoute.jar

      - name: Attach JAR to tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/MindustryAutoRoute.jar
          generate_release_notes: true
