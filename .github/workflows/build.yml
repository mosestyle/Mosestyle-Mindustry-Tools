name: Build and release Mosestyle Mindustry Tools

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Read version from mod.hjson
        id: version
        shell: bash
        run: |
          version="$(sed -nE 's/^[[:space:]]*version:[[:space:]]*"([^"]+)".*/\1/p' mod.hjson | head -n 1)"

          if [ -z "$version" ]; then
            echo "Could not read version from mod.hjson." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          echo "Building version $version"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.1"

      - name: Add Android d8 to PATH
        run: echo "${ANDROID_HOME}/build-tools/34.0.0" >> "$GITHUB_PATH"

      - name: Build Android + desktop JAR
        run: gradle deploy --no-daemon

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: MosestyleMindustryTools-${{ steps.version.outputs.version }}
          path: build/libs/MosestyleMindustryTools.jar

      - name: Automatically create tag and GitHub release
        if: >-
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            echo "No new release was created. Increase version in mod.hjson for the next release."
            exit 0
          fi

          gh release create "$TAG" \
            build/libs/MosestyleMindustryTools.jar \
            --target "$GITHUB_SHA" \
            --title "Mosestyle Mindustry Tools $TAG" \
            --generate-notes
