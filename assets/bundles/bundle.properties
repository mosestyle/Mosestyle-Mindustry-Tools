setting.mindustry-auto-route-panel-compact.name = Compact route panel
setting.mindustry-auto-route-panel-compact.description = Uses the smaller two-column Auto Route controls. Disable this for a wider single-column list.

setting.mindustry-auto-route-core-items.name = Core items display
setting.mindustry-auto-route-core-items.description = Shows items stored in your team's core in a compact two-column HUD panel.

setting.mindustry-auto-route-unit-counts.name = Unit counter display
setting.mindustry-auto-route-unit-counts.description = Shows friendly unit types and counts in the same compact HUD panel.

setting.mindustry-auto-route-time-control.name = Time control
setting.mindustry-auto-route-time-control.description = Adds a compact single-player speed control from x1 to x256. Time control is disabled in multiplayer.

setting.mindustry-auto-route-hud-opacity.name = Items, units & time HUD opacity
setting.mindustry-auto-route-hud-opacity.description = Changes the transparency of the compact upper-right information panel.

setting.mindustry-auto-route-hud-width.name = Items, units & time HUD width
setting.mindustry-auto-route-hud-width.description = Makes the movable items, units, and time-control panel narrower or wider.
