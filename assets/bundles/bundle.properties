setting.mindustry-auto-route-panel-compact.name = Compact route panel
setting.mindustry-auto-route-panel-compact.description = Uses the smaller two-column Auto Route controls inside Mosestyle Mindustry Tools. Disable this for a wider single-column list.

setting.mindustry-auto-route-core-items.name = Core items display
setting.mindustry-auto-route-core-items.description = Shows items stored in your team's core in a compact two-column HUD panel.

setting.mindustry-auto-route-unit-counts.name = Unit counter display
setting.mindustry-auto-route-unit-counts.description = Shows friendly unit types and counts in the same compact HUD panel.

setting.mindustry-auto-route-time-control.name = Time control
setting.mindustry-auto-route-time-control.description = Adds a compact single-player speed control from x1 to x256. Time control is disabled in multiplayer.

setting.mindustry-auto-route-hud-opacity.name = Items, units & time HUD opacity
setting.mindustry-auto-route-hud-opacity.description = Changes the transparency of the compact upper-right information panel.

setting.mindustry-auto-route-hud-width.name = Items, units & time HUD width
setting.mindustry-auto-route-hud-width.description = Makes the movable items, units, and time-control panel narrower or wider.

setting.mindustry-auto-route-enemy-health-bars.name = Enemy health bars
setting.mindustry-auto-route-enemy-health-bars.description = Shows compact health and shield bars above damaged enemy units currently visible on screen.

setting.mindustry-auto-route-enemy-health-bars-opacity.name = Enemy health-bar opacity
setting.mindustry-auto-route-enemy-health-bars-opacity.description = Changes the transparency of enemy health and shield bars.

setting.mindustry-auto-route-enemy-health-bars-scale.name = Enemy health-bar size
setting.mindustry-auto-route-enemy-health-bars-scale.description = Makes enemy health and shield bars smaller or larger.

setting.mindustry-auto-route-custom-music-enabled.name = Enable custom music
setting.mindustry-auto-route-custom-music-enabled.description = Plays imported music through Mosestyle Mindustry Tools using a separate player and volume setting.

setting.mindustry-auto-route-custom-music-controls.name = Show custom music controls
setting.mindustry-auto-route-custom-music-controls.description = Shows a movable in-game player with previous, play/pause, next, shuffle and volume controls.

setting.mindustry-auto-route-custom-music-mute-official.name = Mute official music automatically
setting.mindustry-auto-route-custom-music-mute-official.description = Temporarily sets Mindustry's official music volume to zero while custom music is playing, then restores the previous volume.

setting.mindustry-auto-route-custom-music-shuffle.name = Shuffle custom music
setting.mindustry-auto-route-custom-music-shuffle.description = Chooses a different random imported track when advancing.

setting.mindustry-auto-route-custom-music-repeat.name = Repeat custom playlist
setting.mindustry-auto-route-custom-music-repeat.description = Starts the playlist again after the final track finishes.

setting.mindustry-auto-route-custom-music-volume.name = Custom music volume
setting.mindustry-auto-route-custom-music-volume.description = Controls imported music independently from Mindustry's official music volume.

setting.mindustry-auto-route-custom-music-import.name = Import music
setting.mindustry-auto-route-custom-music-import.description = Imports multiple MP3, OGG, WAV or FLAC files into the private Mosestyle music library.

setting.mindustry-auto-route-custom-music-library.name = Manage music library
setting.mindustry-auto-route-custom-music-library.description = View imported tracks, remove individual songs, import more music or clear the library.

setting.mindustry-auto-route-custom-music-open-folder.name = Open music folder
setting.mindustry-auto-route-custom-music-open-folder.description = Opens the private Mosestyle music directory on desktop so tracks can be added directly.

setting.mindustry-auto-route-custom-music-section.name = Custom Music
